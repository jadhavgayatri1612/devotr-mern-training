<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Async Fetch API </title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Posts List</h1>

    <input type="text" id="searchInput" placeholder="Search posts and press Enter">

    <button id="reloadBtn">Reload Posts</button>

    <p id="loading">Loading...</p>

    <p id="resultCount"></p>

    <div id="errorBox"></div>

    <ul id="postList"></ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
